version: "3.8"

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256 --gc-interval=100
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
