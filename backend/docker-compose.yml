version: "3.8"

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
      # Kľúč z https://openrouteservice.org/dev/#/signup (trasovanie nákladného vozidla HGV)
      - OPENROUTESERVICE_API_KEY=${OPENROUTESERVICE_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
